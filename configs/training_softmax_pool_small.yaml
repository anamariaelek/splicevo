# Training configuration for Splicevo model with SoftmaxSumPool

# Device configuration
device: cuda
cpu_threads: 8
cudnn_benchmark: true
gpu_memory_fraction: 0.8  # Use more GPU memory for larger batches

# Data configuration
data:
  path: /home/elek/sds/sd17d003/Anamaria/splicevo/data/splits_small_5kb/mouse_rat_human/
  use_mmap: true
  train_split: 0.8
  normalization_method: none    # SSE needs no normalization (already [0,1])
  usage_types: ['sse']          # Only SSE for usage training

# Output configuration
output:
  checkpoint_dir: /home/elek/sds/sd17d003/Anamaria/splicevo/models/softmax_pool/small_mouse_rat_human_5kb
  use_tensorboard: true

# Model architecture
model:
  embed_dim: 128
  num_resblocks: 16
  dilation_strategy: alternating
  alternate: 4 
  bottleneck_dim: 128   # Try 128 (default), 256 (balanced), 320, or 640 (full multi-scale)  
  num_classes: 3        # Splice donor, acceptor, not a splice site
  context_len: 450      # This must match context_size in data creation (verify in metadata.json)
  dropout: 0.4

  # Pooling strategy - using SoftmaxSumPool instead of attention
  pooling_type: 'softmax_pool'  # Options: 'attention' or 'softmax_pool'
  
  # Attention parameters (not used when pooling_type='softmax_pool')
  num_heads: 8          # Transformer heads
  
  # SoftmaxSumPool parameters
  mult_factor: 5.0      # Multiplication factor for softmax weighting (higher = sharper weighting)
  mult_factor_learnable: false  # Whether mult_factor should be learnable
  
# Training configuration
training:
  # Optimizer
  learning_rate: 1.0e-4
  weight_decay: 1.0e-3
  warmup_steps: 500      # Linear warmup from 10% to 100% of learning_rate (about 1 epoch) 

  # Loss for splice site prediction
  splice_loss_type: 'cross_entropy'  # Options: 'cross_entropy' or 'focal'
  
  # Class weights for cross_entropy loss
  class_weights: 'inverse'  # Use 'balanced', 'inverse', or specify [w0, w1, w2]
  
  # Focal Loss parameters
  focal_alpha: 'inverse'   # Use 'inverse' or specify [w0, w1, w2]
  focal_gamma: 2.0         # Focusing parameter (higher = more focus on hard examples)

  # Loss for splice site usage (SSE)
  usage_loss_type: 'weighted_mse'  # Options: 'mse', 'bce', 'weighted_mse' or 'hybrid'

  # Weighted MSE parameters
  weighted_mse_extreme_low: 0.1        # Values < this are extreme near zero
  weighted_mse_extreme_high: 0.9       # Values > this are extreme near one
  weighted_mse_extreme_weight: 5.0     # Weight for errors in extreme values (weight for other values=1)

  # Hybrid loss parameters
  hybrid_extreme_low: 0.1       # Values < this classified as "zero"
  hybrid_extreme_high: 0.9      # Values > this classified as "one"
  hybrid_class_weight: 0.8      # Weight for classification component
  hybrid_reg_weight: 0.2        # Weight for regression component

  # How to combine splice site and usage loss
  splice_weight: 0.5
  usage_weight: 0.5
  
  # Dynamic loss balancing - calculate weights from first batches for consistent contributions of splice and usage losses
  use_dynamic_loss_balancing: true  # Recommended for multi-task learning with focal loss
  
  # Training loop
  n_epochs: 50
  early_stopping_patience: 5
  
  # Memory optimization
  use_amp: true
  gradient_accumulation_steps: 4
  
  # DataLoader
  dataloader:
    batch_size: 32
    num_workers: 6
    prefetch_factor: 2
